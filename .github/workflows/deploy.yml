name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Build
        working-directory: apps/web
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_OPENROUTER_MODEL: 'qwen/qwen3.6-max-preview'
          NEXT_PUBLIC_XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          NEXT_PUBLIC_XAI_VOICE: 'eve'
        run: npx next build

      - name: Prepare pages
        working-directory: apps/web
        run: |
          cp out/index.html out/404.html
          touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
